name: Update AQI JSON

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron 使用 UTC 時間
    # 這裡設定每小時第 15 分鐘更新一次
    - cron: "15 * * * *"

permissions:
  contents: write

jobs:
  update-aqi-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download AQI JSON from data.gov.tw resource
        run: |
          curl -L --fail --retry 3 --retry-delay 5 \
            "https://data.moenv.gov.tw/api/v2/aqx_p_432?api_key=af57253c-e838-46da-a1f5-12b43afd75f3&format=JSON&limit=1000&sort=ImportDate+desc" \
            -o aqi.json

          python - <<'PY'
          import json
          with open("aqi.json", "r", encoding="utf-8") as f:
              data = json.load(f)
          records = data.get("records")
          if not isinstance(records, list) or len(records) == 0:
              raise SystemExit("aqi.json has no records")
          print(f"Downloaded {len(records)} AQI records")
          PY

      - name: Commit AQI JSON if changed
        run: |
          if git diff --quiet -- aqi.json; then
            echo "aqi.json unchanged"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add aqi.json
          git commit -m "Update AQI JSON"
          git push