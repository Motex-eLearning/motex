name: Update AQI JSON

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions 使用 UTC 時間
    # 每小時嘗試 3 次，提高排程成功觸發機率
    - cron: "7,27,47 * * * *"

permissions:
  contents: write

concurrency:
  group: update-aqi-json
  cancel-in-progress: false

jobs:
  update-aqi-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download AQI JSON
        run: |
          mkdir -p MKT

          AQI_URL="https://data.moenv.gov.tw/api/v2/aqx_p_432?api_key=af57253c-e838-46da-a1f5-12b43afd75f3&format=JSON&limit=1000&sort=ImportDate+desc"

          echo "開始下載 AQI JSON..."

          for i in 1 2 3 4 5 6 7 8; do
            echo "第 $i 次嘗試下載..."

            if curl --http1.1 -sS -L --fail \
              --connect-timeout 20 \
              --max-time 180 \
              --retry 3 \
              --retry-delay 10 \
              --retry-all-errors \
              "$AQI_URL" \
              -o /tmp/source-aqi.json; then

              echo "curl 下載完成，開始檢查 JSON 格式..."

              if python3 - <<'PY'
          import json

          with open("/tmp/source-aqi.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          if isinstance(data, list):
              records = data
          elif isinstance(data, dict):
              records = data.get("records") or data.get("Records")
          else:
              raise SystemExit("JSON 格式不是陣列或物件")

          if not isinstance(records, list) or len(records) == 0:
              raise SystemExit("AQI records 為空或格式錯誤")

          print(f"JSON 驗證成功，共 {len(records)} 筆資料")
          PY
              then
                echo "下載與驗證成功"
                break
              else
                echo "JSON 驗證失敗，準備重試..."
              fi
            else
              echo "curl 下載失敗，準備重試..."
            fi

            if [ "$i" -eq 8 ]; then
              echo "連續 8 次下載或驗證失敗，停止執行。"
              exit 1
            fi

            sleep 30
          done

          echo "===== Download preview ====="
          head -c 500 /tmp/source-aqi.json
          echo ""
          echo "============================"

          python3 - <<'PY'
          import json
          from datetime import datetime, timezone

          source_path = "/tmp/source-aqi.json"
          target_path = "MKT/aqi.json"

          with open(source_path, "r", encoding="utf-8") as f:
              data = json.load(f)

          if isinstance(data, list):
              records = data
          elif isinstance(data, dict):
              records = data.get("records") or data.get("Records")
          else:
              raise SystemExit("錯誤：JSON 格式不是陣列或物件")

          if not isinstance(records, list):
              raise SystemExit("錯誤：無法取得 AQI records 陣列")

          if len(records) == 0:
              raise SystemExit("錯誤：AQI records 是空的")

          output = {
              "source": "data.gov.tw AQI JSON resource",
              "updated_at_utc": datetime.now(timezone.utc).isoformat(),
              "records": records
          }

          with open(target_path, "w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False, indent=2)

          print(f"成功整理 {len(records)} 筆 AQI 資料到 {target_path}")
          PY

      - name: Commit AQI JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add MKT/aqi.json

          if git diff --cached --quiet; then
            echo "AQI JSON 沒有變更，不需要 commit"
            exit 0
          fi

          git commit -m "Update AQI JSON"
          git push