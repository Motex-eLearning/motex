name: Update AQI JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"

permissions:
  contents: write

jobs:
  update-aqi-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download AQI JSON
        run: |
          mkdir -p MKT

          curl -sS -L --retry 3 --retry-delay 5 \
            "https://data.moenv.gov.tw/api/v2/aqx_p_432?api_key=af57253c-e838-46da-a1f5-12b43afd75f3&format=JSON&limit=1000&sort=ImportDate+desc" \
            -o /tmp/aqi.json

          echo "===== Download preview ====="
          head -c 500 /tmp/aqi.json
          echo ""
          echo "============================"

          python3 - <<'PY'
          import json

          with open("/tmp/aqi.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          records = data.get("records")

          if not isinstance(records, list):
              raise SystemExit("錯誤：JSON 裡沒有 records 陣列")

          if len(records) == 0:
              raise SystemExit("錯誤：records 是空的")

          print(f"成功下載 {len(records)} 筆 AQI 資料")
          PY

          cp /tmp/aqi.json MKT/aqi.json

      - name: Commit AQI JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add MKT/aqi.json

          if git diff --cached --quiet; then
            echo "AQI JSON 沒有變更，不需要 commit"
            exit 0
          fi

          git commit -m "Update AQI JSON"
          git push