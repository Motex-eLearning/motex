name: Update AQI JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"

permissions:
  contents: write

jobs:
  update-aqi-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download AQI JSON
        run: |
          mkdir -p MKT

          curl -sS -L --retry 3 --retry-delay 5 \
            "https://data.moenv.gov.tw/api/v2/aqx_p_432?api_key=af57253c-e838-46da-a1f5-12b43afd75f3&format=JSON&limit=1000&sort=ImportDate+desc" \
            -o /tmp/source-aqi.json

          echo "===== Download preview ====="
          head -c 500 /tmp/source-aqi.json
          echo ""
          echo "============================"

          python3 - <<'PY'
          import json
          from datetime import datetime, timezone

          source_path = "/tmp/source-aqi.json"
          target_path = "MKT/aqi.json"

          with open(source_path, "r", encoding="utf-8") as f:
              data = json.load(f)

          # data.gov.tw 這個 JSON 資源目前最外層是陣列 []
          # 為了讓 aqi.html 好讀取，這裡統一包成 {"records": [...]}
          if isinstance(data, list):
              records = data
          elif isinstance(data, dict):
              records = data.get("records") or data.get("Records")
          else:
              raise SystemExit("錯誤：JSON 格式不是陣列或物件")

          if not isinstance(records, list):
              raise SystemExit("錯誤：無法取得 AQI records 陣列")

          if len(records) == 0:
              raise SystemExit("錯誤：AQI records 是空的")

          output = {
              "source": "data.gov.tw AQI JSON resource",
              "updated_at_utc": datetime.now(timezone.utc).isoformat(),
              "records": records
          }

          with open(target_path, "w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False, indent=2)

          print(f"成功整理 {len(records)} 筆 AQI 資料到 {target_path}")
          PY

      - name: Commit AQI JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add MKT/aqi.json

          if git diff --cached --quiet; then
            echo "AQI JSON 沒有變更，不需要 commit"
            exit 0
          fi

          git commit -m "Update AQI JSON"
          git push