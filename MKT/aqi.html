<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AQI 空氣品質小工具</title>
  <style>
    :root {
      --card-bg: #f8fafc;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #475569;
      --circle: #94a3b8;
      --ring: #e2e8f0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      overflow: hidden;
    }
    .wrap {
      width: 100%;
      min-height: 110px;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: 100%;
      max-width: 720px;
      min-height: 104px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card-bg);
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      box-shadow: 0 1px 2px rgba(15,23,42,.04);
      transition: .25s ease;
    }
    .circle {
      width: 86px;
      height: 86px;
      flex: 0 0 auto;
      border-radius: 50%;
      background: var(--circle);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 0 6px var(--ring);
      position: relative;
    }
    .aqi-label {
      font-size: 13px;
      font-weight: 800;
      opacity: .95;
      line-height: 1;
    }
    .aqi-number {
      font-size: 28px;
      line-height: 1.08;
      font-weight: 900;
      letter-spacing: -.03em;
      margin-top: 4px;
    }
    .aqi-status {
      font-size: 12px;
      font-weight: 800;
      padding: 2px 7px;
      border-radius: 999px;
      background: rgba(15, 23, 42, .16);
      margin-top: 3px;
      white-space: nowrap;
    }
    .content {
      min-width: 0;
      flex: 1;
    }
    .topline {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .pin {
      color: #64748b;
      font-size: 17px;
      line-height: 1;
    }
    .place {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: .02em;
    }
    button {
      border: 0;
      background: transparent;
      color: #0f766e;
      font-weight: 700;
      cursor: pointer;
      padding: 0 4px;
    }
    button:hover { text-decoration: underline; }
    .manual {
      display: none;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    select {
      border: 1px solid #cbd5e1;
      background: rgba(255,255,255,.85);
      border-radius: 8px;
      padding: 3px 8px;
      color: #334155;
      font-weight: 700;
      max-width: 120px;
    }
    .advice {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
      font-weight: 650;
    }
    .time {
      color: #64748b;
      font-size: 12px;
      font-weight: 600;
      margin-top: 3px;
    }
    .source-note {
      color: #64748b;
      font-size: 11px;
      line-height: 1.4;
      font-weight: 500;
      margin-top: 3px;
    }
    @media (max-width: 480px) {
      .card { gap: 10px; padding: 10px; }
      .circle { width: 74px; height: 74px; box-shadow: 0 0 0 5px var(--ring); }
      .aqi-number { font-size: 24px; }
      .aqi-status { font-size: 10px; }
      .place { font-size: 17px; }
      .advice { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="card" class="card">
      <div class="circle" id="circle">
        <div class="aqi-label">AQI</div>
        <div id="aqiNumber" class="aqi-number">--</div>
        <div id="aqiStatus" class="aqi-status">載入中</div>
      </div>

      <div class="content">
        <div class="topline">
          <span class="pin">◎</span>
          <div id="gpsView">
            <span id="place" class="place">正在讀取資料...</span>
            <button type="button" onclick="showManual()">手動切換</button>
          </div>
          <div id="manualView" class="manual">
            <select id="countySelect"></select>
            <select id="siteSelect"></select>
            <button type="button" onclick="retryGps()">重測定位</button>
          </div>
        </div>
        <p id="advice" class="advice">正在同步 AQI 開放資料，請稍候...</p>
        <div id="publishTime" class="time"></div>
        <div id="sourceNote" class="source-note">
          資料來源：政府資料開放平臺－空氣品質指標 AQI，提供機關：環境部。<br>
          本資料依政府資料開放授權條款－第 1 版使用。
        </div>
      </div>
    </div>
  </div>

  <script>
    // 此 HTML 不直接呼叫 data.gov.tw / data.moenv.gov.tw。
    // GitHub Action 會定時抓資料並存成同資料夾的 aqi.json，前端只讀自己的 aqi.json，避免 CORS 問題。
    const LOCAL_AQI_JSON = './aqi.json';

    const AQI_RANGES = [
      { max: 50, label: '良好', bg:'#ecfdf5', border:'#a7f3d0', text:'#065f46', circle:'#10b981', ring:'#d1fae5', advice:'空氣品質良好，適合一般戶外活動。' },
      { max: 100, label: '普通', bg:'#fffbeb', border:'#fde68a', text:'#92400e', circle:'#f59e0b', ring:'#fef3c7', advice:'空氣品質普通；極少數敏感族群若有不適，建議減少長時間戶外活動。' },
      { max: 150, label: '敏感不佳', bg:'#fff7ed', border:'#fed7aa', text:'#9a3412', circle:'#f97316', ring:'#ffedd5', advice:'對敏感族群不健康；孩童、長者及心肺或呼吸道敏感者，請減少長時間戶外活動，外出可配戴口罩。' },
      { max: 200, label: '全民不佳', bg:'#fff1f2', border:'#fecdd3', text:'#9f1239', circle:'#f43f5e', ring:'#ffe4e6', advice:'對所有族群不健康；請減少長時間戶外活動及劇烈運動，外出建議配戴口罩。' },
      { max: 300, label: '非常不佳', bg:'#faf5ff', border:'#e9d5ff', text:'#6b21a8', circle:'#9333ea', ring:'#f3e8ff', advice:'空氣非常不健康；所有人應避免長時間戶外活動，必要外出請配戴口罩並留意身體狀況。' },
      { max: Infinity, label: '危害', bg:'#f5f5f4', border:'#d6d3d1', text:'#1c1917', circle:'#44403c', ring:'#e7e5e4', advice:'已達健康緊急狀況；所有人應避免戶外活動，盡量留在室內，必要外出請配戴口罩。' }
    ];

    let records = [];
    let currentCoords = null;

    function normalizeName(str) {
      return String(str || '').replace(/台/g, '臺').trim();
    }

    function pick(record, keys, fallback = '') {
      for (const key of keys) {
        if (record[key] !== undefined && record[key] !== null && record[key] !== '') return record[key];
      }
      return fallback;
    }

    function getRange(aqi) {
      const n = parseInt(aqi, 10);
      if (Number.isNaN(n)) return null;
      return AQI_RANGES.find(r => n <= r.max) || AQI_RANGES[AQI_RANGES.length - 1];
    }

    async function loadAQI() {
      try {
        const res = await fetch(`${LOCAL_AQI_JSON}?t=${Date.now()}`, { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!data.records || !Array.isArray(data.records) || data.records.length === 0) {
          throw new Error('aqi.json records empty');
        }

        records = data.records.map(r => ({
          sitename: normalizeName(pick(r, ['sitename', 'SiteName'])),
          county: normalizeName(pick(r, ['county', 'County'])),
          aqi: String(pick(r, ['aqi', 'AQI'], '--')),
          status: String(pick(r, ['status', 'Status'], '')),
          longitude: String(pick(r, ['longitude', 'Longitude'], '')),
          latitude: String(pick(r, ['latitude', 'Latitude'], '')),
          publishtime: String(pick(r, ['publishtime', 'PublishTime', 'importdate', 'ImportDate'], ''))
        })).filter(r => r.sitename && r.county);

        if (records.length === 0) throw new Error('no usable records');

        buildDropdowns();
        startGps();
      } catch (err) {
        console.warn(err);
        renderError('讀取失敗', '找不到或無法讀取同資料夾的 aqi.json。請先到 GitHub Actions 手動執行「Update AQI JSON」。');
      }
    }

    function buildDropdowns() {
      const countySelect = document.getElementById('countySelect');
      const siteSelect = document.getElementById('siteSelect');
      const counties = [...new Set(records.map(r => r.county))].sort();

      countySelect.innerHTML = '<option value="">選擇縣市</option>' +
        counties.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
      siteSelect.innerHTML = '<option value="">選擇測站</option>';

      countySelect.onchange = () => {
        if (countySelect.value) {
          buildSiteOptions(countySelect.value);
        } else {
          siteSelect.innerHTML = '<option value="">選擇測站</option>';
        }
        renderBySelected();
      };
      siteSelect.onchange = renderBySelected;
    }

    function buildSiteOptions(county, preferredSite = '') {
      const siteSelect = document.getElementById('siteSelect');
      const sites = records
        .filter(r => normalizeName(r.county) === normalizeName(county))
        .map(r => r.sitename)
        .sort();

      siteSelect.innerHTML = '<option value="">選擇測站</option>' +
        sites.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');

      if (preferredSite && sites.includes(preferredSite)) {
        siteSelect.value = preferredSite;
      } else {
        siteSelect.value = '';
      }
    }

    function startGps() {
      let resolved = false;

      const fallbackToManual = () => {
        if (resolved) return;
        resolved = true;
        showManualWithoutDefault();
      };

      if (!navigator.geolocation) {
        fallbackToManual();
        return;
      }

      const timeout = setTimeout(fallbackToManual, 2500);

      navigator.geolocation.getCurrentPosition(
        pos => {
          if (resolved) return;
          resolved = true;
          clearTimeout(timeout);
          currentCoords = {
            lat: pos.coords.latitude,
            lon: pos.coords.longitude
          };
          const closest = findClosestStation(currentCoords.lat, currentCoords.lon);
          if (closest) {
            renderRecord(closest, true);
            alignDropdown(closest);
          } else {
            showManualWithoutDefault();
          }
        },
        () => {
          clearTimeout(timeout);
          fallbackToManual();
        },
        { timeout: 2500, maximumAge: 600000, enableHighAccuracy: false }
      );
    }

    function showManualWithoutDefault() {
      document.getElementById('gpsView').style.display = 'none';
      document.getElementById('manualView').style.display = 'flex';
      document.getElementById('aqiNumber').textContent = '--';
      document.getElementById('aqiStatus').textContent = '請選擇';
      document.getElementById('advice').textContent = '請選擇縣市與測站查看 AQI。';
      document.getElementById('publishTime').textContent = '';
      applyTheme('#f8fafc', '#e2e8f0', '#334155', '#94a3b8', '#e2e8f0');
    }

    function showManual() {
      document.getElementById('gpsView').style.display = 'none';
      document.getElementById('manualView').style.display = 'flex';
      const county = document.getElementById('countySelect').value;
      const site = document.getElementById('siteSelect').value;
      if (county && site) {
        renderBySelected();
      } else {
        showManualWithoutDefault();
      }
    }

    function retryGps() {
      document.getElementById('manualView').style.display = 'none';
      document.getElementById('gpsView').style.display = 'inline';
      document.getElementById('place').textContent = '重新定位中...';
      startGps();
    }

    function renderBySelected() {
      const county = document.getElementById('countySelect').value;
      const site = document.getElementById('siteSelect').value;
      if (!county || !site) {
        showManualWithoutDefault();
        return;
      }
      const record = records.find(r => normalizeName(r.county) === normalizeName(county) && normalizeName(r.sitename) === normalizeName(site));
      if (record) renderRecord(record, false);
    }

    function alignDropdown(record) {
      const countySelect = document.getElementById('countySelect');
      countySelect.value = record.county;
      buildSiteOptions(record.county, record.sitename);
    }

    function renderRecord(record, gpsMode) {
      const n = parseInt(record.aqi, 10);
      const range = getRange(n);
      const card = document.getElementById('card');
      const circle = document.getElementById('circle');

      document.getElementById('place').textContent = `${record.county}・${record.sitename}`;
      document.getElementById('aqiNumber').textContent = Number.isNaN(n) ? '--' : String(n);

      if (!range) {
        document.getElementById('aqiStatus').textContent = record.status || '暫無資料';
        document.getElementById('advice').textContent = '此測站目前未提供有效 AQI 數值，請手動切換鄰近測站。';
        applyTheme('#f8fafc', '#e2e8f0', '#334155', '#94a3b8', '#e2e8f0');
      } else {
        document.getElementById('aqiStatus').textContent = record.status || range.label;
        document.getElementById('advice').textContent = range.advice;
        applyTheme(range.bg, range.border, range.text, range.circle, range.ring);
      }

      document.getElementById('publishTime').textContent = record.publishtime ? `資料時間：${record.publishtime}` : '';

      if (gpsMode) {
        document.getElementById('gpsView').style.display = 'inline';
        document.getElementById('manualView').style.display = 'none';
      }
    }

    function renderError(status, message) {
      document.getElementById('place').textContent = 'AQI 資料尚未建立';
      document.getElementById('aqiNumber').textContent = '--';
      document.getElementById('aqiStatus').textContent = status;
      document.getElementById('advice').textContent = message;
      document.getElementById('publishTime').textContent = '';
      applyTheme('#f8fafc', '#e2e8f0', '#334155', '#94a3b8', '#e2e8f0');
    }

    function applyTheme(bg, border, text, circle, ring) {
      const root = document.documentElement;
      root.style.setProperty('--card-bg', bg);
      root.style.setProperty('--border', border);
      root.style.setProperty('--text', text);
      root.style.setProperty('--muted', text);
      root.style.setProperty('--circle', circle);
      root.style.setProperty('--ring', ring);
    }

    function findClosestStation(lat, lon) {
      let closest = null;
      let min = Infinity;

      for (const r of records) {
        const rLat = parseFloat(r.latitude);
        const rLon = parseFloat(r.longitude);
        if (Number.isNaN(rLat) || Number.isNaN(rLon)) continue;

        const d = distanceKm(lat, lon, rLat, rLon);
        if (d < min) {
          min = d;
          closest = r;
        }
      }
      return closest;
    }

    function distanceKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const toRad = deg => deg * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLon / 2) ** 2;
      return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    loadAQI();
  </script>
</body>
</html>
