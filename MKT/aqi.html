  <script src="https://cdn.tailwindcss.com"></script>

    body {

    .aqi-transition {

    }
  </style>

<body class="bg-transparent overflow-hidden w-full h-screen flex items-center justify-center p-1">

  <!-- Core Compact Widget Card: Auto RWD Height fitted for 110px - 120px iframe -->
  <div id="widgetCard" class="aqi-transition w-full h-full max-w-xl bg-white border border-slate-100 rounded-2xl p-3 flex items-center gap-3 md:gap-4 shadow-sm relative">
    
    <!-- Core Element 2 & 3: AQI Number & Background Light Circle -->
    <div id="aqiCircle" class="aqi-transition flex-shrink-0 w-16 h-16 md:w-20 md:h-20 rounded-full flex flex-col items-center justify-center text-white shadow-md relative ring-4 ring-slate-100">
      <!-- Soft Ambient Glow -->
      <div id="glowRing" class="absolute inset-0 rounded-full animate-pulse opacity-20"></div>
      
      <span class="text-[8px] md:text-[9px] font-bold opacity-90 tracking-wider uppercase">AQI</span>
      <span id="aqiNumber" class="text-xl md:text-2xl font-black tracking-tight">--</span>
      <span id="aqiStatus" class="text-[8px] md:text-[9px] font-black px-1.5 py-0.5 rounded-full bg-black/15 mt-0.5">載入中</span>
    </div>

    <!-- Core Element 1 & 4: Location Name / Dropdown & One-sentence Advice -->
    <div class="flex-1 min-w-0 flex flex-col justify-center gap-1">
      
      <!-- Location Header Area -->
      <div id="locationArea" class="flex items-center gap-1.5 flex-wrap min-h-[24px]">
        <!-- GPS Success View -->
        <div id="gpsView" class="flex items-center gap-1 text-slate-800">
          <i data-lucide="map-pin" class="w-3.5 h-3.5 text-slate-500"></i>
          <h2 id="locationName" class="text-xs md:text-sm font-extrabold truncate">正在偵測定位...</h2>
          <span id="manualSwitchBtn" onclick="switchToManualMode()" class="text-[10px] text-teal-600 hover:text-teal-700 cursor-pointer ml-2 hover:underline flex-shrink-0">手動切換</span>
        </div>
        
        <!-- Manual Dropdowns View (Swaps smoothly if GPS fails or on click) -->
        <div id="manualView" class="hidden flex items-center gap-1 flex-wrap w-full">
          <select id="countySelect" class="bg-white/90 border border-slate-200 text-[10px] md:text-xs rounded-lg px-2 py-0.5 focus:outline-none focus:ring-1 focus:ring-teal-500 font-bold text-slate-700 max-w-[110px]"></select>
          <select id="siteSelect" class="bg-white/90 border border-slate-200 text-[10px] md:text-xs rounded-lg px-2 py-0.5 focus:outline-none focus:ring-1 focus:ring-teal-500 font-bold text-slate-700 max-w-[110px]"></select>
          <span id="autoLocateBtn" onclick="retryGeolocation()" class="text-[10px] text-teal-600 hover:text-teal-700 cursor-pointer ml-1 hover:underline flex-shrink-0 flex items-center gap-0.5">
            <i data-lucide="navigation" class="w-3 h-3"></i>
            重測定位
          </span>
        </div>
      </div>
      
      <!-- One-sentence Advice -->

        正在尋找您的定位並同步政府空氣品質最新數據，請稍候...

    const DATA_GOV_AQI_SOURCE_URL = 'https://data.moenv.gov.tw/api/v2/aqx_p_432?api_key=af57253c-e838-46da-a1f5-12b43afd75f3&format=json&limit=1000&sort=ImportDate%20desc';

    // 注意：AllOrigins 是第三方免費服務，適合展示或低流量小工具；正式官網大量流量仍建議改用自家 proxy / 快取。
    const DATA_GOV_AQI_JSON_URLS = [
      DATA_GOV_AQI_SOURCE_URL,
      `https://api.allorigins.win/raw?url=${encodeURIComponent(DATA_GOV_AQI_SOURCE_URL)}`
    ];

    // Helper to standardise Traditional Chinese local names (e.g., '台' vs '臺')
    function normalizeName(str) {
      if (!str) return "";
      return String(str).replace(/台/g, "臺").trim();
    }

    // JSON 欄位目前多為小寫；保留大小寫容錯，避免欄位命名變動時讀不到。
    function pickField(record, keys, fallback = "") {
      for (const key of keys) {
        if (record[key] !== undefined && record[key] !== null && record[key] !== "") {
          return record[key];
        }
      }
      return fallback;
    }

    async function fetchJsonWithFallback(urls) {
      let lastError = null;

      for (const url of urls) {
        try {
          const response = await fetch(url, {
            method: "GET",
            mode: "cors",
            credentials: "omit",
            cache: "no-store"
          });

          if (!response.ok) throw new Error("HTTP error " + response.status);

          // 用 text() 再 JSON.parse()，避免 proxy 回傳 Content-Type 不是 application/json 時 response.json() 失敗。
          const text = await response.text();
          return JSON.parse(text);
        } catch (error) {
          lastError = error;
          console.warn("AQI JSON 讀取路徑失敗，準備嘗試下一個路徑：", url, error);
        }
      }

      throw lastError || new Error("All AQI JSON URLs failed");
    }

    // Identify color scheme ranges based on precise numerical values
    function getRange(aqi) {
      const numericAqi = parseInt(aqi) || 0;
      for (const r of AQI_RANGES) {
        if (numericAqi <= r.max) return r;
      }
      return AQI_RANGES[AQI_RANGES.length - 1];
    }

    // Initialize Widget on startup
    window.onload = function() {
      lucide.createIcons();
      // 1. Instantly construct fully cascading menus with 83 stations to prevent dead links
      populateDropdowns(apiRecords);
      // 2. Fetch data.gov.tw AQI JSON resource records
      fetchDataGovAQIData();
      // 3. Initiate geolocation lookup loop
      startLocationSequence();
    };

    // Fetch data.gov.tw AQI JSON Resource (Dataset 40448 / Code AQX_P_432)

      apiLoaded = false;

      const countyBeforeFetch = document.getElementById('countySelect')?.value || "臺中市";
      const siteBeforeFetch = document.getElementById('siteSelect')?.value || "西屯";

      try {
        const resJson = await fetchJsonWithFallback(DATA_GOV_AQI_JSON_URLS);
        if (!resJson || !Array.isArray(resJson.records) || resJson.records.length === 0) {
          throw new Error("Received empty database payload");
        }

        const fallbackMap = new Map(
          FALLBACK_STATIONS.map(station => [
            `${normalizeName(station.county)}__${normalizeName(station.sitename)}`,
            station
          ])
        );

        // 直接以 data.gov.tw JSON 資源回傳資料為主，不再產生仿真值。
        const officialRecords = resJson.records
          .map(rec => {
            const county = normalizeName(pickField(rec, ["county", "County"]));
            const sitename = normalizeName(pickField(rec, ["sitename", "SiteName"]));
            const key = `${county}__${sitename}`;
            const fallback = fallbackMap.get(key) || {};

            const rawAqi = pickField(rec, ["aqi", "AQI"], "");
            const parsedVal = parseInt(rawAqi, 10);

            return {
              sitename,
              county,
              aqi: Number.isNaN(parsedVal) ? "--" : String(parsedVal),
              status: Number.isNaN(parsedVal) ? "維護中" : (pickField(rec, ["status", "Status"], "") || getRange(parsedVal).label),
              longitude: String(pickField(rec, ["longitude", "Longitude"], fallback.longitude || "")),
              latitude: String(pickField(rec, ["latitude", "Latitude"], fallback.latitude || "")),
              pollutant: pickField(rec, ["pollutant", "Pollutant"], ""),
              publishtime: pickField(rec, ["publishtime", "PublishTime", "ImportDate"], ""),
              siteid: pickField(rec, ["siteid", "SiteId", "SiteID"], "")
            };
          })
          .filter(rec => rec.county && rec.sitename);

        if (officialRecords.length === 0) {
          throw new Error("No usable AQI records found");
        }

        apiRecords = officialRecords;
        populateDropdowns(apiRecords, countyBeforeFetch, siteBeforeFetch);
        console.log("data.gov.tw JSON 資源同步完成，AQI 已改用開放資料真實值。");
      } catch (err) {
        console.warn("data.gov.tw AQI JSON 資源讀取失敗，保留暫無資料狀態，不使用亂數。", err);

        // JSON 讀取失敗時顯示「暫無資料」，避免與資料庫真實值對不起來。
        apiRecords = JSON.parse(JSON.stringify(FALLBACK_STATIONS)).map(station => ({
          ...station,
          aqi: "--",
          status: "JSON 讀取失敗"
        }));
        populateDropdowns(apiRecords, countyBeforeFetch, siteBeforeFetch);
      } finally {
        apiLoaded = true;
        onDataAndLocationReady();
      }
    }

    // Trigger standard geolocation lookup with a strict 2.5-second timeout window
    function startLocationSequence() {
      locationCoords = null;
      locationAttemptDone = false;

      fallbackTimer = setTimeout(() => {
        locationAttemptDone = true;
        onDataAndLocationReady(); // Seamlessly fall back to manual menu if location hangs
      }, 2500);

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            clearTimeout(fallbackTimer);
            locationCoords = {
              latitude: position.coords.latitude,
              longitude: position.coords.longitude
            };
            locationAttemptDone = true;
            onDataAndLocationReady();
          },
          (error) => {
            clearTimeout(fallbackTimer);
            locationAttemptDone = true;
            onDataAndLocationReady(); // Fail silently directly to manual dropdowns
          }
        );
      } else {
        clearTimeout(fallbackTimer);
        locationAttemptDone = true;
        onDataAndLocationReady();
      }
    }

    // Coordinates routing engine for layout assignment
    function onDataAndLocationReady() {
      if (!apiLoaded || !locationAttemptDone) return; // Wait until API fetch and geolocation attempt both complete

      if (locationCoords) {
        // Calculate the closest active monitoring station from our 83-station database
        const closest = findClosestStation(locationCoords.latitude, locationCoords.longitude, apiRecords);
        if (closest) {
          showGpsView(closest);
          // Auto-align the dropdown options in the background for a seamless user experience
          selectDropdownStation(closest.county, closest.sitename);
        } else {
          switchToManualMode();
        }
      } else {
        switchToManualMode(); // Silently fallback with zero visual alert noise
      }
    }

    // Distance calculation formula using geographic coordinates (Haversine Formula)
    function findClosestStation(lat, lon, records) {
      let closest = null;
      let minDistance = Infinity;

      for (const record of records) {
        const rLat = parseFloat(record.latitude);
        const rLon = parseFloat(record.longitude);
        if (isNaN(rLat) || isNaN(rLon)) continue;

        const dist = getDistance(lat, lon, rLat, rLon);
        if (dist < minDistance) {
          minDistance = dist;
          closest = record;
        }
      }
      return closest;
    }

    // Standard spherical distance math
    function getDistance(lat1, lon1, lat2, lon2) {
      const R = 6371; // Earth radius in km
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    // Present active layout to show GPS detected station details
    function showGpsView(siteRecord) {
      document.getElementById('gpsView').classList.remove('hidden');
      document.getElementById('manualView').classList.add('hidden');
      
      document.getElementById('locationName').innerText = `${siteRecord.county} · ${siteRecord.sitename}`;
      renderWidget(siteRecord);
      lucide.createIcons();
    }

    // Quietly switch display over to manual selector dropdown arrays
    function switchToManualMode() {
      document.getElementById('gpsView').classList.add('hidden');
      document.getElementById('manualView').classList.remove('hidden');
      
      const countySelect = document.getElementById('countySelect');
      const siteSelect = document.getElementById('siteSelect');
      renderBySiteName(countySelect.value, siteSelect.value);
      lucide.createIcons();
    }

    // Align dropdown selectors to display chosen County and Station
    function selectDropdownStation(county, sitename) {
      const countySelect = document.getElementById('countySelect');
      countySelect.value = county;
      window.updateSiteDropdown(county, sitename);
    }

    // Refresh geographic position manually
    function retryGeolocation() {
      document.getElementById('manualView').classList.add('hidden');
      document.getElementById('gpsView').classList.remove('hidden');
      document.getElementById('locationName').innerText = "重新定位中...";
      
      // Refresh JSON resource in memory first to ensure fresh values
      fetchDataGovAQIData();
      startLocationSequence();
    }

    // Reconstruct and dynamically bind double selector menu sets
    function populateDropdowns(records, preferredCounty = "臺中市", preferredSite = "西屯") {
      const countySelect = document.getElementById('countySelect');
      const siteSelect = document.getElementById('siteSelect');

      // Map unique counties with matching station arrays
      const countyMap = {};
      records.forEach(rec => {
        if (!rec.county || !rec.sitename) return;
        if (!countyMap[rec.county]) {
          countyMap[rec.county] = [];
        }
        countyMap[rec.county].push(rec.sitename);
      });

      const counties = Object.keys(countyMap).sort();

      countySelect.innerHTML = '';
      counties.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c;
        opt.textContent = c;
        countySelect.appendChild(opt);
      });

      // Declare site cascading builder
      window.updateSiteDropdown = function(selectedCounty, selectedSite = null) {
        const sites = countyMap[selectedCounty] || [];
        siteSelect.innerHTML = '';
        sites.sort().forEach(s => {
          const opt = document.createElement('option');
          opt.value = s;
          opt.textContent = s;
          siteSelect.appendChild(opt);
        });

        if (selectedSite && sites.includes(selectedSite)) {
          siteSelect.value = selectedSite;
        } else if (sites.length > 0) {
          siteSelect.value = sites[0];
        }
      };

      // Handle county change
      countySelect.onchange = function() {
        window.updateSiteDropdown(countySelect.value);
        renderBySiteName(countySelect.value, siteSelect.value);
      };

      // Handle station change
      siteSelect.onchange = function() {
        renderBySiteName(countySelect.value, siteSelect.value);
      };

      // Default load configuration to the previous station, otherwise Taichung City / Xitun Station
      const normalizedPreferredCounty = normalizeName(preferredCounty);
      const normalizedPreferredSite = normalizeName(preferredSite);
      const defaultCounty = counties.includes(normalizedPreferredCounty)
        ? normalizedPreferredCounty
        : (counties.includes("臺中市") ? "臺中市" : counties[0]);

      countySelect.value = defaultCounty;
      window.updateSiteDropdown(defaultCounty, normalizedPreferredSite);
      renderBySiteName(defaultCounty, siteSelect.value || normalizedPreferredSite);
    }

    // Trigger update routine via dropdown selections
    function renderBySiteName(county, sitename) {
      const record = apiRecords.find(r => 
        normalizeName(r.county) === normalizeName(county) && 
        normalizeName(r.sitename) === normalizeName(sitename)
      );
      if (record) {
        renderWidget(record);
      }
    }

    // Core renderer mapping numerical AQI to color schemes and advice bubbles
    function renderWidget(siteData) {
      const aqiVal = siteData.aqi;
      const aqiNum = parseInt(aqiVal);

      const widgetCard = document.getElementById('widgetCard');
      const aqiCircle = document.getElementById('aqiCircle');
      const glowRing = document.getElementById('glowRing');

      // 1. Guard against maintenance / blank states
      if (isNaN(aqiNum)) {
        const statusText = siteData.status || "暫無資料";
        document.getElementById('aqiNumber').innerText = "--";
        document.getElementById('aqiStatus').innerText = statusText;
        document.getElementById('healthAdvice').innerText = statusText === "JSON 讀取失敗"
          ? "目前無法讀取 data.gov.tw 的 AQI JSON 資源，請稍後重新整理或確認網路／瀏覽器跨網域設定。"
          : "該測站目前暫無有效 AQI 數值，請點擊「手動切換」參考鄰近測站數據。";

        // Remove active range styles
        AQI_RANGES.forEach(r => {
          r.cardBg.split(' ').forEach(c => widgetCard.classList.remove(c));
          r.circleBg.split(' ').forEach(c => {
            aqiCircle.classList.remove(c);
            glowRing.classList.remove(c);
          });
        });

        // Apply neutral slate styling for maintenance mode
        "bg-slate-50 border-slate-200 text-slate-700".split(' ').forEach(c => widgetCard.classList.add(c));
        "bg-slate-400 ring-slate-100".split(' ').forEach(c => {
          aqiCircle.classList.add(c);
          glowRing.classList.add(c);
        });
        return;
      }

      // 2. Map color ranges
      const matched = getRange(aqiNum);

      // Apply texts
      document.getElementById('aqiNumber').innerText = siteData.aqi || "--";
      document.getElementById('aqiStatus').innerText = siteData.status || matched.label;
      document.getElementById('healthAdvice').innerText = matched.advice;

      // Clean old styles
      AQI_RANGES.forEach(r => {
        r.cardBg.split(' ').forEach(c => widgetCard.classList.remove(c));
        r.circleBg.split(' ').forEach(c => {
          aqiCircle.classList.remove(c);
          glowRing.classList.remove(c);
        });
      });
      "bg-slate-50 border-slate-200 text-slate-700".split(' ').forEach(c => widgetCard.classList.remove(c));
      "bg-slate-400 ring-slate-100".split(' ').forEach(c => {
        aqiCircle.classList.remove(c);
        glowRing.classList.remove(c);
      });

      // Apply new range styles
      matched.cardBg.split(' ').forEach(c => widgetCard.classList.add(c));
      matched.circleBg.split(' ').forEach(c => {
        aqiCircle.classList.add(c);
        glowRing.classList.add(c);
      });
    }
  </script>
